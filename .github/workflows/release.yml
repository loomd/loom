name: Release Build

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build & Release
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: crates/gui/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: crates/gui/frontend

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2

      - name: Build CLI binary
        run: cargo build --release --package loom-cli

      - name: Bundle Tauri GUI App (NSIS Installer)
        run: npx @tauri-apps/cli build
        working-directory: crates/gui/src-tauri
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        # This compiles the app and packages it using the NSIS bundler configured in tauri.conf.json

      - name: Create Portable ZIP Package and generate updater latest.json
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".Substring(1)  # strip leading 'v'
          New-Item -ItemType Directory -Force -Path target/release/portable
          New-Item -ItemType Directory -Force -Path target/release/portable/cli

          # Copy and rename GUI binary to Loom.exe
          Copy-Item -Path target/release/loom-gui.exe -Destination target/release/portable/Loom.exe

          # Copy CLI binary to cli/loom.exe
          Copy-Item -Path target/release/loom.exe -Destination target/release/portable/cli/loom.exe

          # Copy README
          Copy-Item -Path README.md -Destination target/release/portable/README.md

          # Compress with versioned filename
          Compress-Archive -Path target/release/portable/* -DestinationPath "target/release/Loom-${version}-portable-x64.zip"

          # Locate execution installation file and its signature
          $exeFile = Get-ChildItem -Path target/release/bundle/nsis/*.exe | Select-Object -First 1
          if ($exeFile) {
              $exeName = $exeFile.Name
              $sigFile = Get-ChildItem -Path "target/release/bundle/nsis/${exeName}.sig" | Select-Object -First 1
              if ($sigFile) {
                  $signature = Get-Content -Path $sigFile.FullName -Raw
                  $signature = $signature.Trim()
                  $pubDate = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")

                  $latestJson = @{
                      version = $version
                      notes = "Release v${version}"
                      pub_date = $pubDate
                      platforms = @{
                          "windows-x86_64" = @{
                              signature = $signature
                              url = "https://github.com/GoldTest/Loom/releases/download/v${version}/${exeName}"
                          }
                      }
                  }
                  $latestJson | ConvertTo-Json -Depth 10 | Out-File -FilePath target/release/latest.json -Encoding utf8NoBOM
                  Write-Output "Successfully generated latest.json"
              } else {
                  Write-Error "Signature file file not found for ${exeName}"
              }
          } else {
              Write-Error "EXE bundle not found"
          }

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/release/bundle/nsis/*.exe
            target/release/Loom-*-portable-x64.zip
            target/release/latest.json
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
