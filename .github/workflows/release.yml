name: Release Build

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build & Release
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: crates/gui/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: crates/gui/frontend

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2

      - name: Build CLI and GUI
        run: cargo build --release --workspace

      - name: Bundle Tauri GUI App (NSIS Installer)
        run: npx @tauri-apps/cli build
        working-directory: crates/gui/src-tauri
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        # This compiles the app and packages it using the NSIS bundler configured in tauri.conf.json

      - name: Create Portable ZIP Package
        shell: pwsh
        run: |
          # Create staging folder structure to avoid Windows case-insensitive naming conflicts
          New-Item -ItemType Directory -Force -Path target/release/portable
          New-Item -ItemType Directory -Force -Path target/release/portable/cli
          
          # Copy and rename GUI binary to Loom.exe
          Copy-Item -Path target/release/loom-gui.exe -Destination target/release/portable/Loom.exe
          
          # Copy CLI binary to cli/loom.exe
          Copy-Item -Path target/release/loom.exe -Destination target/release/portable/cli/loom.exe
          
          # Copy README
          Copy-Item -Path README.md -Destination target/release/portable/README.md
          
          # Compress staging directory contents
          Compress-Archive -Path target/release/portable/* -DestinationPath target/release/Loom-portable-x64.zip

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/release/bundle/nsis/*.exe
            target/release/Loom-portable-x64.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
